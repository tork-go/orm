services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tork
      POSTGRES_PASSWORD: tork
      POSTGRES_DB: tork_orm_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tork -d tork_orm_dev"]
      interval: 2s
      timeout: 3s
      retries: 20
